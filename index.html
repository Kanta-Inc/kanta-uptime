<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Status Kanta</title>
  <meta name="description" content="État des services Kanta en temps réel." />
  <link rel="icon" href="https://kanta.fr/assets/images/favicon.png" />
  <style>
    :root {
      /* Palette de marque Kanta */
      --bg: #f5f6fa;
      --card: #ffffff;
      --border: #e9e9f5;
      --text: #000d47;       /* bleu nuit Kanta */
      --muted: #666e91;      /* grey600 */
      --up: #09bc8a;         /* system success */
      --down: #d66853;       /* system error */
      --degraded: #fdca40;   /* system warning */
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      /* Ambiance du hero kanta.fr : fond clair + halos lilas / abricot centrés */
      background:
        radial-gradient(760px 700px at 8% 50%, rgba(153, 156, 255, 0.42), transparent 60%),
        radial-gradient(760px 700px at 92% 50%, rgba(255, 202, 186, 0.48), transparent 60%),
        var(--bg);
      background-attachment: fixed;
    }
    .wrap { width: 100%; max-width: 640px; margin: 0 auto; padding: 64px 20px; }
    header { text-align: center; margin-bottom: 40px; }
    header img { height: 30px; width: auto; }

    .banner {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255, 255, 255, 0.72); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px; margin-bottom: 28px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(0, 13, 71, 0.07);
    }
    .banner .dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
    .banner .label { font-size: 17px; font-weight: 600; }
    .banner.up    { border-color: color-mix(in srgb, var(--up) 35%, var(--border)); }
    .banner.up .dot    { background: var(--up); box-shadow: 0 0 0 4px color-mix(in srgb, var(--up) 22%, transparent); }
    .banner.down  { border-color: color-mix(in srgb, var(--down) 35%, var(--border)); }
    .banner.down .dot  { background: var(--down); box-shadow: 0 0 0 4px color-mix(in srgb, var(--down) 22%, transparent); }
    .banner.degraded .dot { background: var(--degraded); box-shadow: 0 0 0 4px color-mix(in srgb, var(--degraded) 22%, transparent); }

    .services { display: flex; flex-direction: column; gap: 10px; }
    .service {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255, 255, 255, 0.72); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 6px 24px rgba(0, 13, 71, 0.05);
    }
    .service .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    .service .name { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .service .name .host { color: var(--muted); font-weight: 400; font-size: 13px; }
    .service .uptime { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
    .service .pill {
      font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
      white-space: nowrap;
    }
    .s-up   .dot { background: var(--up); }
    .s-up   .pill { color: var(--up); background: color-mix(in srgb, var(--up) 14%, transparent); }
    .s-down .dot { background: var(--down); }
    .s-down .pill { color: var(--down); background: color-mix(in srgb, var(--down) 14%, transparent); }
    .s-degraded .dot { background: var(--degraded); }
    .s-degraded .pill { color: var(--degraded); background: color-mix(in srgb, var(--degraded) 14%, transparent); }

    footer { margin-top: 36px; text-align: center; color: var(--muted); font-size: 13px; }
    footer a { color: inherit; }
    .gh { display: inline-flex; margin-top: 12px; color: var(--muted); opacity: 0.5; transition: opacity .15s; }
    .gh:hover { opacity: 1; }
    .gh svg { width: 20px; height: 20px; fill: currentColor; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a href="https://kanta.fr"><img src="https://cdn.prod.website-files.com/682c1c76430cc59bf86ebebc/686d312795571e86d3837714_kanta_new.svg" alt="Kanta" /></a>
    </header>

    <div id="banner" class="banner up">
      <span class="dot"></span>
      <span class="label">Chargement…</span>
    </div>

    <div id="services" class="services"></div>

    <footer>
      <div id="updated"></div>
      <a class="gh" href="https://github.com/Kanta-Inc/kanta-uptime" aria-label="GitHub" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </footer>
  </div>

  <script>
    // Aucune donnée en dur : on n'affiche QUE ce que renvoie ./summary.json (donnée live).
    // Les données trop anciennes sont signalées au lieu d'afficher un faux état « En ligne ».
    var LABELS = { up: "En ligne", down: "Hors ligne", degraded: "Dégradé" };
    var MAX_DATA_AGE_MS = 45 * 60 * 1000;

    function render(data) {
      var allUp = data.every(function (s) { return s.status === "up"; });
      var anyDown = data.some(function (s) { return s.status === "down"; });

      var banner = document.getElementById("banner");
      banner.className = "banner " + (anyDown ? "down" : allUp ? "up" : "degraded");
      banner.querySelector(".label").textContent = allUp
        ? "Tous les systèmes sont opérationnels"
        : anyDown
          ? "Une panne est en cours"
          : "Service partiellement dégradé";

      var list = document.getElementById("services");
      list.innerHTML = data.map(function (s) {
        var cls = s.status === "down" ? "s-down" : s.status === "degraded" ? "s-degraded" : "s-up";
        return '<div class="service ' + cls + '">'
          + '<span class="dot"></span>'
          + '<span class="name">' + escapeHtml(s.name)
            + (s.url ? ' <span class="host">(' + escapeHtml(displayUrl(s.url)) + ')</span>' : '')
            + '</span>'
          + '<span class="uptime">' + (s.uptimeMonth || "") + ' sur 30 j</span>'
          + '<span class="pill">' + (LABELS[s.status] || s.status) + '</span>'
          + '</div>';
      }).join("");
    }

    // hôte + 1er segment de chemin : app.kanta.fr/api/v1/info -> app.kanta.fr/api
    function displayUrl(url) {
      var u = String(url).replace(/^https?:\/\//, "").replace(/\/+$/, "");
      var parts = u.split("/");
      return parts.length > 1 && parts[1] ? parts[0] + "/" + parts[1] : parts[0];
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function setUpdated(updatedAt) {
      var date = updatedAt || new Date();
      document.getElementById("updated").textContent =
        "Mis à jour le " + date.toLocaleDateString("fr-FR") + " à " +
        date.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    }

    function showError() {
      var banner = document.getElementById("banner");
      banner.className = "banner degraded";
      banner.querySelector(".label").textContent = "État indisponible pour le moment";
      document.getElementById("services").innerHTML = "";
      document.getElementById("updated").textContent =
        "Impossible de récupérer l'état des services. Réessayez dans quelques instants.";
    }

    function showStale() {
      var banner = document.getElementById("banner");
      banner.className = "banner degraded";
      banner.querySelector(".label").textContent = "Données de statut obsolètes";
      document.getElementById("services").innerHTML = "";
      document.getElementById("updated").textContent =
        "Le monitoring ne s'est pas mis à jour depuis plus de 45 minutes.";
    }

    Promise.all([
      fetch("./summary.json", { cache: "no-store" }).then(function (r) { return r.ok ? r.json() : Promise.reject(); }),
      fetch("./status-meta.json", { cache: "no-store" }).then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    ])
      .then(function (result) {
        var data = result[0];
        var summaryUpdatedAt = Date.parse(result[1].summaryUpdatedAt);
        if (!Array.isArray(data) || !data.length) return Promise.reject();
        if (!Number.isFinite(summaryUpdatedAt) || Date.now() - summaryUpdatedAt > MAX_DATA_AGE_MS) {
          showStale();
          return;
        }
        render(data);
        setUpdated(new Date(summaryUpdatedAt));
      })
      .catch(showError);
  </script>
</body>
</html>
