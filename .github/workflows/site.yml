# Custom status page deploy (remplace la génération Upptime/Sapper).
# La page vit dans site-custom/. On copie summary.json à côté pour un fetch same-origin.
name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  push:
    branches: [master]
    paths:
      - "site-custom/**"
      - "history/summary.json"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.ref_name }}-upptime
  cancel-in-progress: false
jobs:
  release:
    name: Build and deploy site
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r site-custom/. _site/
          cp history/summary.json _site/summary.json
      - uses: peaceiris/actions-gh-pages@v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: "_site"
          cname: status.kanta.fr
          force_orphan: "false"
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
